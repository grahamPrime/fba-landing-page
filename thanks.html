<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Thanks — FBA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      background: #F7F7F7;
      color: #333333;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      box-sizing: border-box;
    }

    .card {
      width: min(760px, 100%);
      background: #FFFFFF;
      border: 1px solid #e5e7eb;
      border-radius: 2rem;
      padding: clamp(2rem, 6vw, 4rem);
      text-align: center;
      box-shadow: 0 24px 70px rgba(51, 51, 51, 0.08);
    }

    .section-label {
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.75rem;
      font-weight: 700;
      color: #666666;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.75rem, 7vw, 5rem);
      line-height: 1.05;
      letter-spacing: -0.035em;
      margin: 0 0 1.75rem;
    }

    p {
      font-size: 1.25rem;
      color: #666666;
      margin: 0 0 2.5rem;
      line-height: 1.6;
    }

    .btn-primary {
      display: inline-block;
      background: #333333;
      color: white;
      transition: all 0.25s ease;
      text-decoration: none;
      padding: 1rem 2rem;
      border-radius: 9999px;
      font-size: 1.125rem;
      font-weight: 700;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="section-label">Application Received</div>

    <h1>Thanks for applying—we will be in touch shortly!</h1>

    <p>Your waitlist application has been received.</p>

    <a href="/" class="btn-primary">Return to Main Page</a>
  </main>
</body>
</html>
